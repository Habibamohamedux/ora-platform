  <!-- Fonts — Bebas Neue added for --font-display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Tajawal:wght@300;400;500;700;800&family=Wix+Madefor+Text:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">

  <!-- Pre-React shell: matches PageLoader so there's no flash -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #faf8f9; }
    #root { min-height: 100vh; }

    /* Shown only until React hydrates and mounts PageLoader */
    .ora-shell {
      position: fixed;
      inset: 0;
      background: #faf8f9;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .ora-shell-blob {
      width: min(700px, 80vw);
      height: min(700px, 80vw);
      border-radius: 50%;
      background: radial-gradient(
        circle at 50% 50%,
        rgba(201,64,96,0.36) 0%,
        rgba(201,64,96,0.14) 40%,
        transparent 70%
      );
      filter: blur(55px);
    }
  </style>

  <title>ORA | AI Pregnancy & Fertility Companion</title>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root">
    <!-- Matches PageLoader visually — React replaces this instantly on mount -->
    <div class="ora-shell">
      <div class="ora-shell-blob"></div>
    </div>
  </div>
</body>
</html>
